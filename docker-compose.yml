version: "3.8"

services:
    user-database:
        image: postgres:16
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./backend/sql/query:/docker-entrypoint-initdb.d/query
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - postgres-net

    file-storage:
        build:
            context: ./file_storage
            dockerfile: Dockerfile
        ports:
            - "8000:8000"
        environment:
            LISTEN_ADDR: 0.0.0.0:8000
            DATA_LOCATION: /data
        volumes:
            - file_storage_data:/data
        networks:
            - file-storage-net

    hashicorp-vault-dev:
        image: hashicorp/vault
        environment:
            VAULT_DEV_ROOT_TOKEN_ID: "root"
            VAULT_DEV_LISTEN_ADDRESS: "0:0:0:0:8200"
        ports:
            - "8200:8200"
        networks:
            - vault-net

    backend-api:
        build:
            context: ./user_database
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            PROVIDER: ${PROVIDER}
            DB_CONNECTION_STRING: ${DB_CONNECTION_STRING}
            JWT_STORE_PATH: ${JWT_STORE_PATH}
            SUBJECT_NORMAL: ${SUBJECT_NORMAL}
            TIME_IN_M_NORMAL: ${TIME_IN_M_NORMAL}
            SUBJECT_REFRESH: ${SUBJECT_REFRESH}
            TIME_IN_D_REFRESH: ${TIME_IN_D_REFRESH}
            VAULT_ADDR: http://hashicorp-vault-dev:8200
            VAULT_TOKEN: root
        depends_on:
            user-database:
                condition: service_healthy
            hashicorp-vault-dev:
                condition: service_started
            file-storage:
                condition: service_started
        networks:
            - postgres-net
            - general
            - file-storage-net
            - vault-net

    clickhouse-database:
        image: clickhouse/clickhouse-server:latest

        ports:
            - "9000:9000"
            - "8123:8123"
        volumes:
            - clickhouse_data:/var/lib/clickhouse/
            - clickhouse_logs:/var/log/clickhouse-server/
            - ./data_warehouse:/docker-entrypoint-initdb.d/
        networks:
            - clickhouse-net

volumes:
    postgres_data:
    clickhouse_data:
    clickhouse_logs:
    file_storage_data:

networks:
    clickhouse-net:
    postgres-net:
    file-storage-net:
    vault-net:
    general:

