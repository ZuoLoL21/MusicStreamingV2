version: "3.8"

services:
    user-database:
        image: postgres:16
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./backend/sql/query:/docker-entrypoint-initdb.d/query
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    hashicorp-vault-dev:
        image: hashicorp/vault
        environment:
            VAULT_DEV_ROOT_TOKEN_ID: "root"
            VAULT_DEV_LISTEN_ADDRESS: "0:0:0:0:8200"
        ports:
            - "8200:8200"

    clickhouse-database:
        image: clickhouse/clickhouse-server:latest

        ports:
            - "9000:9000"
            - "8123:8123"
        volumes:
            - clickhouse_data:/var/lib/clickhouse/
            - clickhouse_logs:/var/log/clickhouse-server/
            - ./data_warehouse:/docker-entrypoint-initdb.d/
        networks:
            - clickhouse-net

volumes:
    postgres_data:
    clickhouse_data:
    clickhouse_logs:

networks:
    clickhouse-net:
    postgres-net:
    general:

