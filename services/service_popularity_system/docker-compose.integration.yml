services:
  # ClickHouse test instance with tmpfs for speed
  clickhouse-test:
    image: clickhouse/clickhouse-server:23.8
    container_name: service-popularity-clickhouse-test
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "9004:9000"  # Different from production port 9000
      - "8126:8123"
    volumes:
      - ../database_data_warehouse/01_events.sql:/docker-entrypoint-initdb.d/01_events.sql:ro
      - ../database_data_warehouse/02_features.sql:/docker-entrypoint-initdb.d/02_features.sql:ro
      - ../database_data_warehouse/21_popularity_inter.sql:/docker-entrypoint-initdb.d/21_popularity_inter.sql:ro
      - ../database_data_warehouse/22_popularity.sql:/docker-entrypoint-initdb.d/22_popularity.sql:ro
      - ../database_data_warehouse/23_theme_all_time.sql:/docker-entrypoint-initdb.d/23_theme_all_time.sql:ro
    tmpfs:
      - /var/lib/clickhouse  # In-memory storage for speed
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "clickhouse", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  # Vault test instance (dev mode)
  vault-test:
    image: hashicorp/vault:latest
    container_name: service-popularity-vault-test
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "18202:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  # Vault initialization - setup transit engine and JWT keys
  vault-init-test:
    image: hashicorp/vault:latest
    container_name: service-popularity-vault-init-test
    environment:
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
    volumes:
      - ./tests/integration/scripts/init-vault.sh:/init-vault.sh:ro
    entrypoint: ["/bin/sh", "/init-vault.sh"]
    depends_on:
      vault-test:
        condition: service_healthy
    networks:
      - integration-test-net

  # Test runner container
  integration-tests:
    build:
      context: ../..
      dockerfile: services/service_popularity_system/Dockerfile.integration.test
    container_name: service-popularity-integration-tests
    environment:
      # ClickHouse config
      CLICKHOUSE_HOST: clickhouse-test
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
      # Vault config
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      VAULT_APPLICATION_NAME: popularity-system
      JWT_STORE_PATH: /tmp/jwt_stores
    depends_on:
      clickhouse-test:
        condition: service_healthy
      vault-init-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

networks:
  integration-test-net:
    driver: bridge
