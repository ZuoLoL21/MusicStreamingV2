version: '3.8'

services:
  minio-test:
    image: minio/minio:latest
    container_name: minio-test
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"  # Use different port to avoid conflicts
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: testuser
      MINIO_ROOT_PASSWORD: testpassword
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-net

  minio-init-test:
    image: minio/mc:latest
    container_name: minio-init-test
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio-test:9000 testuser testpassword; do
        echo 'Waiting for MinIO...'
        sleep 1
      done &&
      /usr/bin/mc mb minio/test-bucket --ignore-existing &&
      /usr/bin/mc anonymous set download minio/test-bucket &&
      echo 'MinIO initialized successfully'
      "
    depends_on:
      minio-test:
        condition: service_healthy
    networks:
      - test-net

  integration-tests:
    build:
      context: ../..
      dockerfile: services/service_user_database/Dockerfile.test
    container_name: minio-integration-tests
    environment:
      MINIO_ENDPOINT: minio-test:9000
      MINIO_PUBLIC_ENDPOINT: localhost:19000
      MINIO_ACCESS_KEY: testuser
      MINIO_SECRET_KEY: testpassword
      MINIO_BUCKET_NAME: test-bucket
      MINIO_USE_SSL: "false"
    depends_on:
      minio-init-test:
        condition: service_completed_successfully
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
