services:
  # ClickHouse test instance with tmpfs for speed
  clickhouse-test:
    image: clickhouse/clickhouse-server:23.8
    container_name: service-event-ingestion-clickhouse-test
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "9003:9000"  # Different from production port 9000
      - "8125:8123"
    tmpfs:
      - /var/lib/clickhouse  # In-memory storage for speed
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  # Vault test instance (dev mode)
  vault-test:
    image: hashicorp/vault:latest
    container_name: service-event-ingestion-vault-test
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "18201:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  # Vault initialization - setup transit engine and JWT keys
  vault-init-test:
    image: hashicorp/vault:latest
    container_name: service-event-ingestion-vault-init-test
    environment:
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
    entrypoint: >
      /bin/sh -c "
      until vault status; do
        echo 'Waiting for Vault...'
        sleep 1
      done &&
      (vault secrets enable -path=transit transit || echo 'Transit already enabled') &&
      (vault write -f transit/keys/event-ingestion type=rsa-4096 || echo 'event-ingestion key exists') &&
      echo 'Vault initialized successfully'
      "
    depends_on:
      vault-test:
        condition: service_healthy
    networks:
      - integration-test-net

  # Test runner container
  integration-tests:
    build:
      context: ../..
      dockerfile: services/service_event_ingestion/Dockerfile.integration.test
    container_name: service-event-ingestion-integration-tests
    environment:
      # ClickHouse config
      CLICKHOUSE_HOST: clickhouse-test
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
      # Vault config
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
    depends_on:
      clickhouse-test:
        condition: service_healthy
      vault-init-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

networks:
  integration-test-net:
    driver: bridge
