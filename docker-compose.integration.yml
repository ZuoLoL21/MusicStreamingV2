services:
  # Databases
  database-postgres-user-test:
    image: postgres:16-alpine
    container_name: postgres-user-test
    environment:
      POSTGRES_DB: music_streaming_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "15432:5432"
    volumes:
      - ./services/service_user_database/sql/schema:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d music_streaming_test"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  database-postgres-bandit-test:
    image: postgres:16-alpine
    container_name: postgres-bandit-test
    environment:
      POSTGRES_DB: bandit_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "15433:5432"
    volumes:
      - ./services/service_bandit_system/src/sql:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d bandit_test"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  database-clickhouse-test:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse-test
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse_test
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "19000:9000"
      - "18123:8123"
    volumes:
      - ./services/database_data_warehouse:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "clickhouse", "--password", "clickhouse_test", "--query", "SELECT 1"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  database-minio-test:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: testuser
      MINIO_ROOT_PASSWORD: testpassword
    ports:
      - "19001:9000"
      - "19002:9001"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - integration-test-net

  # Vault
  vault-test:
    image: hashicorp/vault:1.18.1
    container_name: vault-test
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "18200:8200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--timeout=1", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - integration-test-net

  # Initialization services
  init-minio-test:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: init-minio-test
    environment:
      MINIO_HOST: database-minio-test
      MINIO_ROOT_USER: testuser
      MINIO_ROOT_PASSWORD: testpassword
    volumes:
      - ./services/init_database_minio/defaults:/defaults:ro
      - ./services/init_database_minio/init.sh:/scripts/init.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    depends_on:
      database-minio-test:
        condition: service_healthy
    networks:
      - integration-test-net

  init-vault-test:
    image: hashicorp/vault:1.18.1
    container_name: init-vault-test
    environment:
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
    volumes:
      - ./services/init_hashicorp_vault/init.sh:/scripts/init.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    depends_on:
      vault-test:
        condition: service_healthy
    networks:
      - integration-test-net

  init-music-data-test:
    build:
      context: ./services/init_music_data
      dockerfile: Dockerfile
    container_name: init-music-data-test
    environment:
      POSTGRES_HOST: database-postgres-user-test
      POSTGRES_PORT: "5432"
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: music_streaming_test
      MINIO_ENDPOINT: database-minio-test:9000
      MINIO_ACCESS_KEY: testuser
      MINIO_SECRET_KEY: testpassword
      MINIO_BUCKET_NAME: music-streaming
    volumes:
      - ./services/init_music_data/seed_music:/seed_music:ro
    depends_on:
      database-postgres-user-test:
        condition: service_healthy
      database-minio-test:
        condition: service_healthy
      init-minio-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net
    restart: "no"

  # Services
  service-user-database-test:
    build:
      context: .
      dockerfile: services/service_user_database/Dockerfile
    container_name: service-user-database-test
    environment:
      USER_CRUD_CONNECTION_STRING: "postgresql://test_user:test_password@database-postgres-user-test:5432/music_streaming_test"
      JWT_STORE_PATH: jwt/backend
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      MINIO_ENDPOINT: database-minio-test:9000
      MINIO_ACCESS_KEY: testuser
      MINIO_SECRET_KEY: testpassword
      MINIO_BUCKET_NAME: music-streaming
      EVENT_INGESTION_SERVICE_URL: http://service-event-ingestion-test:8080
      ENVIRONMENT: test
    depends_on:
      database-postgres-user-test:
        condition: service_healthy
      init-vault-test:
        condition: service_completed_successfully
      database-minio-test:
        condition: service_healthy
      service-event-ingestion-test:
        condition: service_started
    networks:
      - integration-test-net

  service-bandit-test:
    build:
      context: services/service_bandit_system
      dockerfile: Dockerfile
    container_name: service-bandit-test
    environment:
      DB_CONNECTION_STRING_WAREHOUSE: "clickhouse://clickhouse:clickhouse_test@database-clickhouse-test:8123/default"
      WAREHOUSE_BANDIT_DATA_TABLE: bandit_input_per_theme
      DB_CONNECTION_STRING_PARAMS: "postgresql://test_user:test_password@database-postgres-bandit-test:5432/bandit_test"
      BANDIT_DATA_TABLE: bandit_data
      BANDIT_ALPHA: "0.5"
      BANDIT_RIDGE_LAMBDA: "1.0"
      SHERMAN_MORRISON_RECOMPUTE_INTERVAL: "100"
      SHERMAN_MORRISON_DIVERGENCE_THRESHOLD: "1e-6"
      ENVIRONMENT: test
    depends_on:
      database-postgres-bandit-test:
        condition: service_healthy
      database-clickhouse-test:
        condition: service_healthy
    networks:
      - integration-test-net

  service-popularity-test:
    build:
      context: .
      dockerfile: services/service_popularity_system/Dockerfile
    container_name: service-popularity-test
    environment:
      WAREHOUSE_URL: "clickhouse://clickhouse:clickhouse_test@database-clickhouse-test:9000/default"
      TABLE_NAME: popularity_data
      JWT_STORE_PATH: jwt/popularity
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      ENVIRONMENT: test
    depends_on:
      database-clickhouse-test:
        condition: service_healthy
      init-vault-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

  service-event-ingestion-test:
    build:
      context: .
      dockerfile: services/service_event_ingestion/Dockerfile
    container_name: service-event-ingestion-test
    environment:
      CLICKHOUSE_CONNECTION_STRING: "clickhouse://clickhouse:clickhouse_test@database-clickhouse-test:9000/default"
      JWT_STORE_PATH: jwt/event-ingestion
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      ENVIRONMENT: test
    depends_on:
      database-clickhouse-test:
        condition: service_healthy
      init-vault-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

  # Gateways
  gateway-recommendation-test:
    build:
      context: .
      dockerfile: services/gateway_recommendation/Dockerfile
    container_name: gateway-recommendation-test
    environment:
      POPULARITY_SERVICE_URL: http://service-popularity-test:8080
      BANDIT_SERVICE_URL: http://service-bandit-test:8080
      JWT_STORE_PATH: jwt/gateway-recommendation
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      ENVIRONMENT: test
    depends_on:
      service-popularity-test:
        condition: service_started
      service-bandit-test:
        condition: service_started
      init-vault-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

  gateway-api-test:
    build:
      context: .
      dockerfile: services/gateway_api/Dockerfile
    container_name: gateway-api-test
    ports:
      - "18080:8080"
    environment:
      USER_DATABASE_SERVICE_URL: http://service-user-database-test:8080
      RECOMMENDATION_SERVICE_URL: http://gateway-recommendation-test:8080
      EVENT_INGESTION_SERVICE_URL: http://service-event-ingestion-test:8080
      JWT_STORE_PATH: jwt/gateway-api
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      ENVIRONMENT: test
    depends_on:
      service-user-database-test:
        condition: service_started
      gateway-recommendation-test:
        condition: service_started
      service-event-ingestion-test:
        condition: service_started
      init-vault-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

  # E2E Test Runner
  e2e-tests:
    build:
      context: .
      dockerfile: tests_e2e/Dockerfile.e2e.test
    container_name: e2e-tests
    environment:
      # Gateway API
      GATEWAY_URL: http://gateway-api-test:8080
      # For direct service testing (if needed)
      EVENT_INGESTION_URL: http://service-event-ingestion-test:8080
      POPULARITY_URL: http://service-popularity-test:8080
      RECOMMENDATION_URL: http://gateway-recommendation-test:8080
      # Vault config
      VAULT_ADDR: http://vault-test:8200
      VAULT_TOKEN: test-root-token
      # Test credentials
      TEST_USER_EMAIL: test@example.com
      TEST_USER_PASSWORD: testpassword123
    depends_on:
      gateway-api-test:
        condition: service_started
      init-music-data-test:
        condition: service_completed_successfully
    networks:
      - integration-test-net

networks:
  integration-test-net:
    driver: bridge
